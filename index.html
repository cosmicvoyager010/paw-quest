<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Paw-Quest</title>

  <style>
    #world {
      width: 100%;
      height: 300px;
      position: relative;
      border: 1px solid #ddd;
      overflow: hidden;
      background: #fafafa;
    }

    #pet {
      position: absolute;
      font-size: 60px;
      left: 50px;
      top: 150px;
      transition: left 0.2s linear, top 0.2s linear;
    }

    .idle { transform: scale(1); }
    .walk { animation: walk 0.4s infinite; }
    .happy { animation: happy 0.5s infinite; }
    .bark { animation: bark 0.2s infinite; }
    .sit { transform: scale(0.9); }

    @keyframes walk {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0px); }
    }

    @keyframes happy {
      0%,100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-10px) scale(1.1); }
    }

    @keyframes bark {
      0%,100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
  </style>
</head>

<body>

  <h1>Paw-Quest 🐶</h1>

  <!-- 🌍 WORLD -->
  <div id="world">
    <div id="pet">🐶</div>
  </div>

  <!-- 📊 STATUS -->
  <pre id="output">Loading...</pre>

  <!-- 🎮 CONTROLS -->
  <button id="start">Start</button>
  <button id="step">Walk / Train</button>
  <button id="end">Stop</button>

  <button onclick="command('sit')">Sit</button>
  <button onclick="command('stay')">Stay</button>
  <button onclick="command('come')">Come</button>

  <script src="app.js"></script>

</body>
</html>
